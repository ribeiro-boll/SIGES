spring:
  application:
    name: FluxoCasa
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://db:5432/siges
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql=true
    defer-datasource-initialization: true

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
server:
  address: 0.0.0.0
  port: 8080